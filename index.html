<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Finanças Mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        /* CONFIGURAÇÕES MOBILE-FIRST */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Open Sans', sans-serif;
            background-color: #111827; 
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ESTRUTURA DO SLIDE */
        .slide {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .slide.ativo { display: flex; }

        /* TIPOGRAFIA ADAPTADA PARA TELAS PEQUENAS */
        h1 { font-family: 'Montserrat', sans-serif; font-size: 10vw; font-weight: 900; text-align: center; margin: 40px 0 20px; color: #ffffff; }
        
        h2 { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 5.5vw; 
            font-weight: 700; 
            text-align: center; 
            background: #ffffff; 
            color: #111827; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            line-height: 1.3;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .subtitulo { font-size: 4.5vw; text-align: center; color: #9ca3af; margin-bottom: 30px; }
        
        .contador { 
            font-size: 3.5vw; 
            background: #374151; 
            padding: 5px 15px; 
            border-radius: 20px; 
            align-self: center; 
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* RESPOSTAS EM COLUNA (MELHOR PARA MOBILE) */
        .grid-respostas {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            padding-bottom: 30px;
        }

        .btn-resposta {
            font-family: 'Montserrat', sans-serif;
            font-size: 4.8vw;
            font-weight: 700;
            color: white;
            border: none;
            padding: 18px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            text-align: left;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        
        .btn-resposta:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

        .btn-resposta::before {
            content: '';
            width: 24px;
            height: 24px;
            margin-right: 15px;
            background-color: rgba(255,255,255,0.3);
            flex-shrink: 0;
        }

        .vermelho { background-color: #e21b3c; } .vermelho::before { transform: rotate(45deg); }
        .azul { background-color: #1368ce; } .azul::before { border-radius: 50%; }
        .amarelo { background-color: #d89e00; } .amarelo::before { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .verde { background-color: #26890c; }

        /* PAINEL DE SOLUÇÃO MOBILE */
        .painel-solucao {
            display: none;
            background: #ffffff;
            color: #111827;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            margin-bottom: 30px;
        }
        .solucao-titulo { font-family: 'Montserrat', sans-serif; font-size: 6vw; font-weight: 900; color: #26890c; text-align: center; margin-bottom: 15px; }
        .texto-calculo { font-size: 4.2vw; line-height: 1.4; margin-bottom: 10px; font-weight: 600; }
        .formula-destaque { background: #f3f4f6; padding: 15px; border-radius: 10px; font-size: 5.5vw; font-weight: 800; color: #1368ce; text-align: center; margin: 15px 0; }

        .btn-avancar {
            background-color: #3b82f6;
            color: white;
            font-size: 5vw;
            font-weight: 700;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            margin: 20px auto;
            width: 80%;
            display: block;
        }

        .errou { opacity: 0.3; }
        .acertou { border: 3px solid white; animation: pulsar 0.4s infinite alternate; }
        @keyframes pulsar { from { transform: scale(1); } to { transform: scale(1.02); } }
    </style>
</head>

        <h1>DESAFIO FINANÇAS</h1>
        <p class="subtitulo">10 Questões de Juros Simples</p>
        <button class="btn-avancar" onclick="ir('slide-capa', 'slide-q1')">Iniciar</button>
    </div>
